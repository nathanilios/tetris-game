<!DOCTYPE html>
<html>
<head>
    <title>Tetris with Hold</title>
    <style>
        /* SECTION 1: STYLES (The looks) */
        body { background: #202028; color: #fff; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .game-container { display: flex; gap: 20px; align-items: flex-start; margin-top: 20px; }
        canvas { border: solid 2px #fff; background-color: #000; }
        .side-panel { display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

    <h1>Tetris</h1>
    <div id="score">Score: 0</div>

    <div class="game-container">
        <div class="side-panel">
            <div>HOLD</div>
            <canvas id="hold" width="100" height="100"></canvas>
        </div>

        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div class="side-panel">
            <div>NEXT</div>
            </div>
    </div>

    <script>
        /* SECTION 3: LOGIC (The brain) */
        
        // 1. Setup Main Canvas
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        // 2. Setup Hold Canvas
        const holdCanvas = document.getElementById('hold');
        const holdContext = holdCanvas.getContext('2d');
        holdContext.scale(20, 20);

        // 3. New Variables for Hold
        let holdPiece = null;
        let canHold = true;

        // 4. Piece & Matrix logic (The functions I gave you earlier)
        function createPiece(type) {
            if (type === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
            if (type === 'O') return [[2, 2], [2, 2]];
            if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

        // 5. The HOLD Function logic
        function playerHold() {
            if (!canHold) return;

            if (holdPiece === null) {
                holdPiece = player.matrix;
                playerReset(); 
            } else {
                const temp = player.matrix;
                player.matrix = holdPiece;
                holdPiece = temp;
                player.pos.y = 0;
                player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            }
            canHold = false;
            drawHold();
        }

        function drawHold() {
            holdContext.fillStyle = '#000';
            holdContext.fillRect(0, 0, holdCanvas.width, holdCanvas.height);
            if (holdPiece) {
                drawMatrix(holdPiece, {x: 1, y: 1}, holdContext);
            }
        }

        // 6. Movement and Collision Logic
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function drawMatrix(matrix, offset, ctx = context) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            canHold = true; // REFRESH HOLD ABILITY
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
            }
        }

        // (Include rotation, drop, and arena sweep logic here...)
        // [Simplified for space - keep your existing rotate/drop/sweep functions!]

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        // 7. Input Controls
        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) player.pos.x--; // Left
            else if (event.keyCode === 39) player.pos.x++; // Right
            else if (event.keyCode === 40) player.pos.y++; // Down (Soft drop)
            else if (event.keyCode === 38) playerRotate(1); // Up (Rotate)
            else if (event.keyCode === 67) playerHold();    // C (Hold)
            
            // Re-check collisions after manual move
            if (collide(arena, player)) {
                 // reverse movement logic would go here
            }
        });

        // Initialize Game
        const arena = Array.from({length: 20}, () => Array(12).fill(0));
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        function update(time = 0) {
            // Your animation loop (draw, requestAnimationFrame, etc.)
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        playerReset();
        update();
    </script>
</body>
</html>
